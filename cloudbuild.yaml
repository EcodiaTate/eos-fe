steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}'
      - '-t'
      - '${_IMAGE}'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_IMAGE}'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_IMAGE}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - '${_IMAGE}'

substitutions:
  _IMAGE: 'australia-southeast1-docker.pkg.dev/ecodiaos/ecodiaos/frontend:latest'
  _SERVICE_NAME: 'ecodiaos-frontend'
  _REGION: 'australia-southeast1'
  _NEXT_PUBLIC_API_URL: 'https://ecodiaos-core-oeipavsn4a-ts.a.run.app'
